<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f7f3ea" />
    <title>南関競馬AI</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css?v=20260714g" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">N</div>
          <div>
            <h1>南関競馬AI</h1>
            <p id="statusLine">読み込み中</p>
          </div>
        </div>
        <div class="top-actions">
          <label class="pin-box" id="pinBox" hidden>
            <span>PIN</span>
            <input id="pinInput" type="password" inputmode="numeric" autocomplete="off" />
          </label>
          <button class="icon-button" id="refreshButton" type="button" title="更新">↻</button>
        </div>
      </header>

      <main>
        <section class="control-band" aria-label="開催選択">
          <label>
            <span>開催日</span>
            <select id="dateSelect"></select>
          </label>
          <label>
            <span>競馬場</span>
            <select id="placeSelect"></select>
          </label>
        </section>

        <!-- トップ画面：レース一覧（競馬場ごとに横並び・横スクロール） -->
        <section class="list-view" id="listView">
          <div class="rail-head">
            <span class="rail-head-title">レース一覧</span>
            <div class="rail-sort" role="group" aria-label="並び替え">
              <button class="rail-sort-btn active" id="sortByRace" type="button" aria-pressed="true">レース順</button>
              <button class="rail-sort-btn" id="sortByConf" type="button" aria-pressed="false">信用度順</button>
            </div>
          </div>
          <section class="race-board" id="raceRail" aria-label="レース一覧"></section>
        </section>

        <!-- レースを選ぶと表示される予想ビュー -->
        <section class="race-view" id="raceView" hidden>
          <div class="race-view-head">
            <button class="back-btn" id="backToList" type="button">← 一覧へ</button>
            <span class="race-view-title" id="raceViewTitle"></span>
            <div class="race-nav" aria-label="前後レース移動">
              <button class="race-nav-btn" id="prevRace" type="button" title="前レースへ" aria-label="前レースへ">←</button>
              <button class="race-nav-btn" id="nextRace" type="button" title="次レースへ" aria-label="次レースへ">→</button>
            </div>
          </div>
          <section class="workspace">
            <aside class="eval-aside" id="raceSummary" aria-label="評価一覧"></aside>

            <section class="main-panel">
              <nav class="tabs" id="raceTabs" aria-label="表示切替">
                <button class="tab active" data-tab="pace" type="button">展開</button>
                <button class="tab" data-tab="odds" type="button">オッズ</button>
                <button class="tab" data-tab="speed" type="button">指数</button>
                <button class="tab" data-tab="index" type="button">相対評価</button>
                <button class="tab" data-tab="ai" type="button">出走馬分析</button>
                <button class="tab" data-tab="match" type="button">対戦表</button>
                <button class="tab" data-tab="memo" type="button">メモ</button>
              </nav>

              <div class="tab-panel active" id="panelPace"></div>
              <div class="tab-panel" id="panelOdds"></div>
              <div class="tab-panel" id="panelSpeed"></div>
              <div class="tab-panel" id="panelIndex"></div>
              <div class="tab-panel" id="panelAi"></div>
              <div class="tab-panel" id="panelMatch"></div>
              <div class="tab-panel" id="panelMemo"></div>
            </section>
          </section>
        </section>
      </main>
    </div>

    <template id="emptyTemplate">
      <div class="empty-state">
        <strong></strong>
        <p></p>
      </div>
    </template>

    <script src="/app.js?v=20260714g" defer></script>
  </body>
</html>
