<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f7f3ea" />
    <title>南関競馬AI</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">N</div>
          <div>
            <h1>南関競馬AI</h1>
            <p id="statusLine">読み込み中</p>
          </div>
        </div>
        <div class="top-actions">
          <label class="pin-box" id="pinBox">
            <span>PIN</span>
            <input id="pinInput" type="password" inputmode="numeric" autocomplete="off" />
          </label>
          <button class="icon-button" id="refreshButton" type="button" title="更新">↻</button>
        </div>
      </header>

      <main>
        <section class="control-band" aria-label="レース選択">
          <label>
            <span>開催日</span>
            <select id="dateSelect"></select>
          </label>
          <label>
            <span>競馬場</span>
            <select id="placeSelect"></select>
          </label>
          <div class="metric-strip" id="metricStrip"></div>
        </section>

        <section class="race-rail" id="raceRail" aria-label="レース一覧"></section>

        <section class="workspace">
          <aside class="race-summary" id="raceSummary"></aside>

          <section class="main-panel">
            <nav class="tabs" aria-label="表示切替">
              <button class="tab active" data-tab="prediction" type="button">予想</button>
              <button class="tab" data-tab="result" type="button">結果</button>
              <button class="tab" data-tab="memo" type="button">メモ</button>
              <button class="tab" data-tab="stats" type="button">成績</button>
            </nav>

            <div class="tab-panel active" id="panelPrediction"></div>
            <div class="tab-panel" id="panelResult"></div>
            <div class="tab-panel" id="panelMemo"></div>
            <div class="tab-panel" id="panelStats"></div>
          </section>
        </section>
      </main>
    </div>

    <template id="emptyTemplate">
      <div class="empty-state">
        <strong></strong>
        <p></p>
      </div>
    </template>

    <script src="/app.js" defer></script>
  </body>
</html>
